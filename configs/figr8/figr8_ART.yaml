stage1_params:
  name: "VSQ"  # always keep this "VectorGPT"
  vector_decoder_model: "mlp" # "mlp" or "raster_conv"
  quantized_dim: 512
  codebook_size: 4096  # will be ignored for FSQ
  image_loss: "mse"  # "pyramid" or "mse"
  vq_method: "fsq"  # "vqvae", "FSQ", "vqtorch"
  fsq_levels: [7,5,5,5,5]  # will determine codebook_size, see Table 1 of FSQ paper - [7,5,5,5,5] for 4096 (e.g. StrokeNUWA), [8,5,5,5] for 1024
  num_segments: 4
  num_codes_per_shape: 2
  alpha: 0.1
  pred_color: false
  lseg: 5.0
  checkpoint_path: "/sc/projects/sci-aisc/marco.cipriano/results/svg/Grimoire/VSQ/figr8/VSQ_nseg=4_ncode=2_lseg=5.0_alpha=0.1None/checkpoints/last.ckpt"

model_params:
  name: "VQ_SVG_Stage2"
  max_seq_len: 562  # 512 + 50 for text
  dim: 512 # 512
  ff_mult: 2 # for 1024 hidden dim (i think)
  depth: 16  # paper says 12 but config in code repo says 16
  heads: 8
  text_encoder_str: "google/bert_uncased_L-12_H-512_A-8"  # this ensures embedding dim of text encoder is 512
  use_alibi_positional_bias : False

data_params:
  dataset: "figr8"
  csv_path: "/sc/projects/sci-aisc/marco.cipriano/data/SVG/Grimoire/figr8/tokenized/VSQ_nseg=4_ncode=2_lseg=5.0_alpha=0.1None/split.csv"  # root path for CausalSVGDataModule in dataset.py
  vq_token_npy_path: "/sc/projects/sci-aisc/marco.cipriano/data/SVG/Grimoire/figr8/tokenized/VSQ_nseg=4_ncode=2_lseg=5.0_alpha=0.1None/tokenized.npy"
  train_batch_size: 16  #32
  val_batch_size:  16  # 32
  num_workers: 32
  width: 128
  max_text_token_length: 50
  min_context_length: 10  # all samples below this will be removed from the dataset
  fraction_of_class_only_inputs: 0.1  # fraction of samples that will only have the "class" entry of the dataframe as input
  fraction_of_blank_inputs: 0.1  # fraction of samples that will have empty text input
  fraction_of_iconshop_chatgpt_inputs: 0.25
  fraction_of_full_description_inputs: 0.55
  shuffle_vq_order: false  # whether to shuffle the order of the VQ tokens, its not really "shuffling", but more cutting the sequence into two parts and switching their order
  use_pre_computed_text_tokens_only: False  # if True, the text tokens that were pre-computed will be used as input, if False, the text will be tokenized in the dataloader (according to the specified fractions).
  grid_size: 256

exp_params:
  lr: 0.0006  # 0.00002
  weight_decay: 1.e-4  # specify positive float to enable, start experimenting with 1.e-4/1.e-3
  scheduler_gamma: 0.96  # set this for ExponentialLR schedule
  warmup_steps: 50000
  train_log_interval: 0.25  # decides how often full generations are made and logged
  val_log_interval: 0.5
  # metric_log_interval: 1.0
  manual_seed: 42
  post_process: False  # whether to log with svg fixing

trainer_params:
  devices: -1  # always keep at -1 as this takes all available GPUs specified through CUDA_VISIBLE_DEVICES
  max_epochs: 100  # dsnt matter too much, got early stopping implemented
  accumulate_grad_batches: 2

logging_params:
  entity: "aiis-chair"
  project: "grimoire-2"  # your wandb project name
#  save_dir: "/sc/projects/sci-aisc/marco.cipriano/results/svg/Grimoire/ART/figr8/nseg=4_ncode=2_lseg=5_alpha01_256grid"
  save_dir: "/sc/projects/sci-aisc/marco.cipriano/results/svg/Grimoire/ART/figr8/"
  name: "ART_S4C2G256"  # name of the run in wandb
  version: 0
  author: "Marco"  # will be a tag in wandb