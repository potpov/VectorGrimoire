stage1_params:
  name: "SVG_VAQVAE"  # always keep this "VectorGPT"
  vector_decoder_model: "mlp" # "mlp" or "raster_conv"
  quantized_dim: 512
  codebook_size: 4096  # will be ignored for FSQ
  image_loss: "mse"  # "pyramid" or "mse"
  single_code_representation: true
  vq_method: "fsq"  # "vqvae", "FSQ", "vqtorch"
  fsq_levels: [7,5,5,5,5]  # will determine codebook_size, see Table 1 of FSQ paper - [7,5,5,5,5] for 4096 (e.g. StrokeNUWA), [8,5,5,5] for 1024
  checkpoint_path: "/scratch2/moritz_logs/SVG_VQVAE/Stage1/glyphazzn_full_single_code/checkpoints/last.ckpt"

model_params:
  name: "VQ_SVG_Stage2"
  max_seq_len: 256  # 512
  dim: 512 # 512
  depth: 12  # 12
  heads: 8
  text_encoder_str: "bert-base-uncased"
  use_alibi_positional_bias : False

data_params:
  dataset: "tokens"  # must be in the DATASETMAP in run.py
  csv_path: "/scratch2/moritz_data/glyphazzn/tokenized/split.csv"  # root path for CausalSVGDataModule in dataset.py
  train_batch_size: 64  #32
  val_batch_size:  64  # 32
  num_workers: 8
  width: 128

exp_params:
  lr: 0.0006  # 0.00002
  weight_decay: 1.e-4  # specify positive float to enable, start experimenting with 1.e-4/1.e-3
  scheduler_gamma: 0.96  # 0.95 is a good starting value
  train_log_interval: 100  # decides how often full generations are made and logged
  manual_seed: 1265

trainer_params:
  devices: -1  # always keep at -1 as this takes all available GPUs specified through CUDA_VISIBLE_DEVICES
  max_epochs: 300  # dsnt matter too much, got early stopping implemented
  accumulate_grad_batches: 2

logging_params:
  # entity: "aiis-chair"  # comment to use default wandb entity "mfeuer"
  project: "thesis"  # your wandb project name
  save_dir: "/scratch2/moritz_logs/SVG_VQVAE/Stage2/glyphazzn_full_single_code"
  name: "Stage 2 glyphazzn, single code representation"  # name of the run in wandb
  version: 0
  author: "Moritz"  # will be a tag in wandb