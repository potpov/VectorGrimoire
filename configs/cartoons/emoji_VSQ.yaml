model_params:
  name: "VSQ_layers"  # layered/colored VSQ experiment (emoji)
  vector_decoder_model: "hydra" # "mlp" or "raster_conv" or "hydra"
  quantized_dim: 512
  codebook_size: 4096  # ignored for FSQ (see fsq_levels)
  image_loss: ["pyramid"]  # "pyramid" or "mse" or "composite"
  single_code_representation: true
  vq_method: "fsq"  # "vqvae", "fsq", "vqtorch"
  fsq_levels: [7,7,7,5,5] # determines codebook size, see Table 1 of the FSQ paper
  num_segments: 16
  pred_color: true
  num_colors: 4096

data_params:
  dataset: "cartoons"
  data_path: "/sc/projects/sci-aisc/marco.cipriano/data/SVG/Grimoire/emoji_selection"  # preprocessed emoji dir (see Potpov/grimoire-emoji)
  layer_length: 16
  train_batch_size: 4  # note: effective batch size becomes train_batch_size * layer_length
  val_batch_size:  4
  num_workers: 8
  patch_size: 128
  return_raw: true

exp_params:
  lr: 0.00002
  weight_decay: 1.e-4
  scheduler_gamma: 0.98
  train_log_interval: 0.9
  manual_seed: 1265
  schedule_pyramid_method: "linear"  # "linear" / "exponential" / null to disable
  pyrapid_interpolation_epochs: 15  # epochs after which we switch to MSE only
  continue_checkpoint: null  # set to resume; the published weights are Potpov/grimoire-checkpoints/emoji/vsq/last.ckpt

trainer_params:
  devices: -1  # takes all GPUs exposed via CUDA_VISIBLE_DEVICES
  max_epochs: 200  # early stopping is implemented

logging_params:
  project: "grimoire"  # your wandb project name
  save_dir: "results/svg/Grimoire/VSQ"  # where checkpoints/logs are written
  name: "emoji_VSQ_hydra_small_noout"
  version: 1
  author: "Marco"
  allow_val_change: true
