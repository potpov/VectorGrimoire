model_params:
  name: "VectorVAEnLayers"
  in_channels: 3
  latent_dim: 256
  loss_fn: 'MSE'
  paths: 10
  T: 10
  beta: 0.1
  radius: 3
  scale_factor: 1
  learn_sampling: False
  only_auxillary_training: False
  memory_leak_training: False
  other_losses_weight: 0
  composite_fn: 'soft'
  optimize_colors: False
  imsize: 128

data_params:
  dataset: "raster_figr8"
  csv_path: "/scratch2/moritz_data/raster_figr8/split.csv"
  img_size: 128
  train_batch_size: 256
  val_batch_size:  256
  num_workers: 32
  invert: True
  channels: 3
  fill: False

exp_params:
  LR: 0.0001
  weight_decay: 1.e-4
  scheduler_gamma: 0.98
  grow: True
  manual_seed: 12345
  train_log_interval: 50
  kld_weight: 0.1
  resample_circle_segments: True
  # continue_checkpoint: "/scratch2/moritz_logs/Im2Vec/figr8_star/checkpoints/last.ckpt"

trainer_params:
  devices: -1
  max_epochs: 150
  limit_train_batches: 0.05
  limit_val_batches: 0.05

logging_params:
  entity: "aiis-chair-students"  # comment to use default wandb entity "mfeuer"
  project: "generative-svg"  # your wandb project name
  save_dir: "/scratch2/moritz_logs/Im2Vec/figr8"
  name: "Im2Vec Figr8 - full dataset"  # name of the run in wandb
  version: 9
  author: "Moritz"  # will be a tag in wandb
  # id: null  # id of wandb run to continue
  # allow_val_change: False  # allow changing values in this config w.r.t. the run that you're continuing (good for changing loss weightings mid-run)
  