model_params:
  name: "VSQ"  # always keep this "VectorGPT"
  vector_decoder_model: "mlp" # "mlp" or "raster_conv"
  quantized_dim: 512
  codebook_size: 4096  # will be ignored for FSQ
  image_loss: "mse"  # "pyramid" or "mse"
  vq_method: "fsq"  # "vqvae", "FSQ", "vqtorch"
  fsq_levels: [7,5,5,5,5]  # will determine codebook_size, see Table 1 of FSQ paper - [7,5,5,5,5] for 4096 (e.g. StrokeNUWA), [8,5,5,5] for 1024
  num_segments: 2
  num_codes_per_shape: 1
  pred_color: false

data_params:
  dataset: "fonts"  # must be in the DATASETMAP in run.py
  csv_path: "/raid/marco.cipriano/data/SVG/Grimoire/fonts/svgs_simplified/split_fixed.csv"
  channels: 3  # use 3
  width: 128
  train_batch_size: 64
  val_batch_size:  64
  num_workers: 16
  individual_max_length : 3.0  # max length of a single stroke, decides the width/height of rendered shapes
  stroke_width: 0.4  # IMPORTANT: this must scale with individiual_max_length as they together define the image
  # subset: "all"
  use_single_paths: False
  max_shapes_per_svg: 64

exp_params:
  lr: 2.0e-05  # 0.00002
  weight_decay: 1.e-4  # specify positive float to enable, start experimenting with 1.e-4/1.e-3
  scheduler_gamma: 0.98  # 0.95 is a good starting value
  train_log_interval: 0.0001 # len(dataset) / train_batch_size / desired_logging_frequency
  val_log_interval: 0.002
  manual_seed: 42

trainer_params:
  devices: -1  # always keep at -1 as this takes all available GPUs specified through CUDA_VISIBLE_DEVICES
  max_epochs: 2  # dsnt matter too much, got early stopping implemented
  # accumulate_grad_batches: 2
  val_check_interval: 0.1


logging_params:
  entity: "aiis-chair"
  project: "grimoire-2"  # your wandb project name
  save_dir: "/raid/marco.cipriano/results/svg/Grimoire/VSQ"
  name: "VSQ_FONTS"  # name of the run in wandb
  version: 0
  author: "Marco"  # will be a tag in wandb